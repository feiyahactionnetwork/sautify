[build]
  command = "npm run build"
  publish = "dist"

# Branch deploy of the meeting demo (static, simulated mode). Only applies when
# Netlify builds this branch; production (main) is untouched.
[context."claude/sautify-pavrisk-demo-yfp3qt"]
  command = "npm --prefix demo-app install && npm --prefix demo-app run build"
  publish = "demo-app/dist"

[build.environment]
  NODE_VERSION = "20"

[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"

[[redirects]]
  from = "/api/ledger"
  to = "/.netlify/functions/list-ledger"
  status = 200

[[redirects]]
  from = "/api/ledger/evidence"
  to = "/.netlify/functions/submit-evidence"
  status = 200

[[redirects]]
  from = "/api/ledger/:id/settle"
  to = "/.netlify/functions/simulate-settlement"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

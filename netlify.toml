[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "20"

[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"

# Keep the free-tier Supabase project from auto-pausing: run a tiny query every
# 3 days (well inside Supabase's ~7-day inactivity window) at 06:00 UTC.
[functions."keep-alive"]
  schedule = "0 6 */3 * *"

[[redirects]]
  from = "/api/ledger"
  to = "/.netlify/functions/list-ledger"
  status = 200

[[redirects]]
  from = "/api/ledger/evidence"
  to = "/.netlify/functions/submit-evidence"
  status = 200

[[redirects]]
  from = "/api/ledger/:id/settle"
  to = "/.netlify/functions/simulate-settlement"
  status = 200

[[redirects]]
  from = "/api/ledger/:id/export.dsr"
  to = "/.netlify/functions/export-dsr"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

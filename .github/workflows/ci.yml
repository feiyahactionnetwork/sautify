name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20' # matches netlify.toml NODE_VERSION
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build marketing site
        run: npm run build

      - name: Unit tests
        run: npm test

      - name: Pipeline PoC end-to-end check
        run: npm run test:pipeline
